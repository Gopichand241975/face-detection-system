version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: facedetect-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: faceuser
      POSTGRES_PASSWORD: facepass
      POSTGRES_DB: facedetection
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U faceuser -d facedetection"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: facedetect-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://faceuser:facepass@db:5432/facedetection
      ALLOWED_ORIGINS: '["http://localhost", "http://localhost:3000", "http://frontend"]'
      FACE_CONFIDENCE_THRESHOLD: "0.5"
      SECRET_KEY: "change-me-in-production-please"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: facedetect-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:
